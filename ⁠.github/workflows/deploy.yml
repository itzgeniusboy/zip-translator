name: Deploy Telegram Bot to Koyeb

on:
  push:
    branches:
      - main  # Jab bhi main branch par push hoga, deployment chalu ho jayegi

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Koyeb CLI
      run: |
        curl -fsSL https://www.koyeb.com/install.sh | sh
        echo "${HOME}/.koyeb/bin" >> $GITHUB_PATH

    - name: Deploy to Koyeb
      env:
        KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}  # Koyeb settings se token yahan aayega
      run: |
        koyeb login --token "$KOYEB_TOKEN"
        # Agar service pehle se bani hai toh redefine/redeploy karega
        koyeb service redeploy my-translator-bot-service
