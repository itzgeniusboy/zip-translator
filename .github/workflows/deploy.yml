name: Deploy Telegram Bot to Koyeb

on:
  push:
    branches:
      - main  # Jab bhi main branch par push hoga, deployment chalu ho jayegi

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Koyeb CLI
      run: |
        curl -fsSL https://www.koyeb.com/install.sh | sh
        echo "${HOME}/.koyeb/bin" >> $GITHUB_PATH

    - name: Deploy to Koyeb
      env:
        KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}  # GitHub Secrets se token uthayega
      run: |
        # Bina login kiye direct --token flag use karenge har command mein
        koyeb service redeploy my-translator-bot-service --token "$KOYEB_TOKEN" || koyeb app init my-translator-bot --git github.com/${{ github.repository }} --branch main --type git --ports 80:http --routes /:80 --token "$KOYEB_TOKEN"
